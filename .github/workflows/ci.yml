name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs postinstall -> `prisma generate`, which only needs the
      # schema (no database), so CI requires no secrets.
      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test
