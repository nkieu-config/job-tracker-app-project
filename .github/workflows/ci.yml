name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_test

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Guard the HNSW index against accidental migration drops
        run: |
          last=$(grep -hoE '(CREATE|DROP) INDEX[^;]*resume_version_embedding_hnsw_idx' prisma/migrations/*/migration.sql | tail -n 1)
          if [[ "$last" != CREATE* ]]; then
            echo '::error::Migrations drop resume_version_embedding_hnsw_idx without recreating it. Re-add the CREATE INDEX to the newest migration (see prisma/migrations/20260709120000_restore_hnsw_index_and_jd_embedding_hash).'
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB secrets needed).
      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy
        env:
          DIRECT_URL: ${{ env.TEST_DATABASE_URL }}

      - run: npm run test:coverage

      # Three countable claims — unit tests, browser tests, eval suites — made
      # in two places a reader actually looks: the README and the landing page.
      # The landing page was the one that proved the point, advertising "300+"
      # tests and "5" eval suites against a real 425 and 6, because the guard
      # only ever read the README.
      #
      # `vitest list` collects the integration tests only when
      # TEST_DATABASE_URL is set, so without it this would compare a short
      # count against the docs and demand the docs be "fixed" to a wrong
      # number; fail on that instead. `playwright test --list` collects
      # without launching a browser, so the browser count is checked here
      # rather than in the e2e job.
      - name: Advertised counts must match the suites
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo '::error::TEST_DATABASE_URL is unset, so the integration tests are not collected and the unit count would come up short.'
            exit 1
          fi

          check() {
            label="$1"
            actual="$2"
            file="$3"
            pattern="$4"
            advertised=$(grep -oE "$pattern" "$file" | grep -oE '[0-9]+' | sort -u)
            if [ -z "$advertised" ]; then
              echo "::error::No $label count found in $file — the drift guard has nothing to check there. Either the claim was removed or its wording changed; update the pattern in this workflow."
              exit 1
            fi
            for n in $advertised; do
              if [ "$n" != "$actual" ]; then
                echo "::error::$file advertises $n $label but the real count is $actual. Update every mention of it in $file."
                exit 1
              fi
            done
            echo "$label in $file: agrees on $actual."
          }

          UNIT=$(npx vitest list 2>/dev/null | wc -l | tr -d ' ')
          BROWSER=$(npx playwright test --list 2>/dev/null | sed -nE 's/^Total: ([0-9]+) tests.*/\1/p')
          SUITES=$(ls evals/suites/*.eval.ts | wc -l | tr -d ' ')

          check "unit tests"    "$UNIT"    README.md        '([0-9]+ tests|of the [0-9]+)'
          check "unit tests"    "$UNIT"    src/app/page.tsx '"[0-9]+", label: "automated tests"'
          check "browser tests" "$BROWSER" README.md        '[0-9]+ browser tests'
          check "eval suites"   "$SUITES"  README.md        '[0-9]+-suite AI eval harness'
          check "eval suites"   "$SUITES"  src/app/page.tsx '"[0-9]+", label: "AI eval suites"'

      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5433/placeholder

  # The browser suites need what the unit tests deliberately avoid: a real
  # build, running, against a real database, with the demo account seeded. That
  # is a different shape of job from `verify` and a slower one, so it runs
  # beside it rather than after it, and a red cross says which half broke.
  #
  # This is also where the accessibility gate actually gates. Left to a manual
  # `npm run test:e2e`, "axe fails the build on any serious violation" is a
  # promise nothing keeps.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_e2e?sslmode=disable
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_e2e?sslmode=disable
      BETTER_AUTH_SECRET: ci-e2e-secret-used-only-by-this-throwaway-container
      BETTER_AUTH_URL: http://localhost:3000
      BASE_URL: http://localhost:3000

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install the browser
        run: npx playwright install --with-deps chromium

      - name: Apply migrations
        run: npx prisma migrate deploy

      - run: npm run build

      # Started detached rather than through Playwright's `webServer`: the demo
      # account is seeded through the running app (Better Auth hashes the
      # password server-side), which has to happen after start and before the
      # first test.
      - name: Start the app
        run: |
          npm run start > /tmp/next-server.log 2>&1 &
          for _ in $(seq 1 60); do
            if curl -sfo /dev/null http://localhost:3000/sign-in; then
              echo "App is serving."
              exit 0
            fi
            sleep 1
          done
          echo '::error::The app did not start within 60s.'
          cat /tmp/next-server.log
          exit 1

      # No GEMINI_API_KEY on purpose: the seed skips embeddings without one and
      # the suites never click an AI action, so the browser tests cost no model
      # quota. Resume fit renders its empty state, which is what they assert.
      - name: Seed the demo account
        run: npm run seed

      # Retries stay on so a genuine one-off does not fail the branch, but a
      # test that only passes on its second attempt is a finding, not a pass —
      # this is what stops the suite going quietly green on flake.
      - run: npx playwright test --fail-on-flaky-tests

      - name: Upload the Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Server log
        if: failure()
        run: cat /tmp/next-server.log
