name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Guard the HNSW index against accidental migration drops
        run: |
          last=$(grep -hoE '(CREATE|DROP) INDEX[^;]*resume_version_embedding_hnsw_idx' prisma/migrations/*/migration.sql | tail -n 1)
          if [[ "$last" != CREATE* ]]; then
            echo '::error::Migrations drop resume_version_embedding_hnsw_idx without recreating it. Re-add the CREATE INDEX to the newest migration (see prisma/migrations/20260709120000_restore_hnsw_index_and_jd_embedding_hash).'
            exit 1
          fi

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB secrets needed).
      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:coverage

      # `vitest list` only collects, so the placeholder URL is never dialled —
      # it just un-skips the opt-in Postgres suite so the count is the full one.
      - name: Advertised test count must match the suite
        run: |
          actual=$(TEST_DATABASE_URL=postgresql://placeholder npx vitest list 2>/dev/null | wc -l | tr -d ' ')
          advertised=$( { grep -oE '[0-9]+ tests' README.md; grep -oE 'tests \([0-9]+\)' docs/manual-qa.md; } | grep -oE '[0-9]+' | sort -u )
          if [ -z "$advertised" ]; then
            echo '::error::No advertised test count found in README.md / docs/manual-qa.md — the drift guard has nothing to check.'
            exit 1
          fi
          for n in $advertised; do
            if [ "$n" != "$actual" ]; then
              echo "::error::Docs advertise $n tests but the suite defines $actual. Update the counts in README.md and docs/manual-qa.md."
              exit 1
            fi
          done
          echo "Advertised test count matches the suite: $actual"

      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/placeholder
