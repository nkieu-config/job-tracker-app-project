name: AI Eval

# Manual only — evals call the real Gemini API (cost + quota), so they are not
# part of the push/PR CI. Run from the Actions tab; the scorecard is uploaded
# as an artifact. Requires a GEMINI_API_KEY repository secret.
on:
  workflow_dispatch:
    inputs:
      suite:
        # A dropdown rather than free text: the runner exits non-zero on an
        # unknown name, and this list had silently fallen three suites behind.
        # `skill-match` is the default because it is the only suite that runs
        # entirely on the embeddings quota (1000/day), so it is the one that is
        # always affordable to re-run.
        description: "Suite to run"
        type: choice
        default: skill-match
        options:
          - all
          - jd-analysis
          - skill-match
          - tailoring
          - coach
          - autofill
          - interview

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUITE: ${{ inputs.suite }}
        run: npm run eval -- "$SUITE"

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-report
          path: evals/reports/
