name: Reseed demo

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reseed-demo
  cancel-in-progress: false

jobs:
  reseed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate` (no DB secrets needed).
      - run: npm ci

      # The seed signs the demo account up through the live app (so passwords
      # hash server-side) and resets only that account's own rows. The Gemini
      # key lets it pre-compute embeddings so the resume-fit ranking is
      # populated right after the reseed; without the secret the seed still
      # succeeds and just skips them.
      - name: Reseed the demo account against production
        env:
          BASE_URL: https://applywise-tracker.vercel.app
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo '::error::The PROD_DIRECT_URL repository secret is not set. Add the production branch direct connection string (kept as a comment in the local .env) under Settings -> Secrets and variables -> Actions.'
            exit 1
          fi
          npm run seed
